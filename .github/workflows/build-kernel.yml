name: Build Kernel - Pixel 4 XL (SukiSU-Ultra + SUSFS)

on:
  workflow_dispatch:
    inputs:
      kernelsu_tag:
        description: 'SukiSU-Ultra branch/tag'
        required: false
        default: 'susfs-main'
      susfs_branch:
        description: 'SUSFS branch'
        required: false
        default: 'kernel-4.14'

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    steps:
      - name: Checkout kernel source
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            bc bison build-essential ca-certificates cpio curl \
            flex git kmod libelf-dev libssl-dev \
            lz4 python3 python3-pip zip unzip wget \
            binutils-aarch64-linux-gnu mkbootimg

      - name: Download Clang toolchain (ZyCromerZ Clang 16)
        run: |
          mkdir -p $HOME/toolchains/clang
          # ZyCromerZ Clang 16 - known to work with kernel 4.14 floral
          wget -q "https://github.com/ZyCromerZ/Clang/releases/download/16.0.6-20230721-release/Clang-16.0.6-20230721.tar.gz" \
            -O $HOME/toolchains/clang.tar.gz
          tar -xf $HOME/toolchains/clang.tar.gz -C $HOME/toolchains/clang --strip-components=1
          echo "CLANG_PATH=$HOME/toolchains/clang/bin" >> $GITHUB_ENV
          $HOME/toolchains/clang/bin/clang --version

      - name: Download GCC toolchains
        run: |
          git clone --depth=1 \
            https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/aarch64/aarch64-linux-android-4.9 \
            $HOME/toolchains/aarch64-linux-android
          echo "GCC64=$HOME/toolchains/aarch64-linux-android/bin/aarch64-linux-android-" >> $GITHUB_ENV

          git clone --depth=1 \
            https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/arm/arm-linux-androideabi-4.9 \
            $HOME/toolchains/arm-linux-androideabi
          echo "GCC32=$HOME/toolchains/arm-linux-androideabi/bin/arm-linux-androideabi-" >> $GITHUB_ENV

      - name: Download stock boot.img (coral Android 13)
        run: |
          mkdir -p $HOME/stock && cd $HOME/stock
          wget -q "https://dl.google.com/dl/android/aosp/coral-tp1a.220624.014-factory-8f60813e.zip" -O factory.zip
          unzip -q factory.zip
          cd coral-tp1a.220624.014
          unzip -q image-coral-tp1a.220624.014.zip boot.img
          echo "STOCK_BOOT=$HOME/stock/coral-tp1a.220624.014/boot.img" >> $GITHUB_ENV

      - name: Integrate SukiSU-Ultra
        run: |
          rm -f drivers/kernelsu
          rm -rf KernelSU
          curl -LSs "https://raw.githubusercontent.com/SukiSU-Ultra/SukiSU-Ultra/main/kernel/setup.sh" | bash -s ${{ github.event.inputs.kernelsu_tag }}

      - name: Apply SUSFS patches (kernel-4.14)
        run: |
          git clone --depth=1 -b ${{ github.event.inputs.susfs_branch }} \
            https://gitlab.com/simonpunk/susfs4ksu.git $HOME/susfs4ksu
          cp -v $HOME/susfs4ksu/kernel_patches/fs/* fs/
          cp -v $HOME/susfs4ksu/kernel_patches/include/linux/* include/linux/
          cp $HOME/susfs4ksu/kernel_patches/KernelSU/10_enable_susfs_for_ksu.patch KernelSU/
          cd KernelSU && patch -p1 --forward < 10_enable_susfs_for_ksu.patch || true && cd ..
          cp $HOME/susfs4ksu/kernel_patches/50_add_susfs_in_kernel-4.14.patch .
          patch -p1 --forward < 50_add_susfs_in_kernel-4.14.patch || true

      - name: Disable KPROBE hooks in KernelSU (non-GKI)
        run: |
          find KernelSU -type f \( -name '*.c' -o -name '*.h' \) | \
            xargs sed -i 's/#ifdef CONFIG_KPROBES/#if defined(CONFIG_KPROBES) \&\& 0/g'

      - name: Add SukiSU + SUSFS config options to floral_defconfig
        run: |
          DEFCONFIG=arch/arm64/configs/floral_defconfig
          # Disable stack protector strong - not supported by all Clang builds
          sed -i 's/CONFIG_CC_STACKPROTECTOR_STRONG=y/# CONFIG_CC_STACKPROTECTOR_STRONG is not set/' $DEFCONFIG
          printf 'CONFIG_KSU=y\n' >> $DEFCONFIG
          printf 'CONFIG_KSU_MANUAL_HOOK=y\n' >> $DEFCONFIG
          printf 'CONFIG_KSU_SUSFS=y\n' >> $DEFCONFIG
          printf 'CONFIG_KSU_SUSFS_SUS_PATH=y\n' >> $DEFCONFIG
          printf 'CONFIG_KSU_SUSFS_SUS_MOUNT=y\n' >> $DEFCONFIG
          printf 'CONFIG_KSU_SUSFS_SUS_KSTAT=y\n' >> $DEFCONFIG
          printf 'CONFIG_KSU_SUSFS_SUS_OVERLAYFS=y\n' >> $DEFCONFIG
          printf 'CONFIG_KSU_SUSFS_TRY_UMOUNT=y\n' >> $DEFCONFIG
          printf 'CONFIG_KSU_SUSFS_AUTO_ADD_SUS_KSU_DEFAULT_MOUNT=y\n' >> $DEFCONFIG
          printf 'CONFIG_KSU_SUSFS_AUTO_ADD_TRY_UMOUNT_FOR_BIND_MOUNT=y\n' >> $DEFCONFIG
          printf 'CONFIG_KSU_SUSFS_SPOOFE_UNAME=y\n' >> $DEFCONFIG
          printf 'CONFIG_KSU_SUSFS_ENABLE_LOG=y\n' >> $DEFCONFIG
          tail -20 $DEFCONFIG

      - name: Build kernel
        run: |
          export PATH="${{ env.CLANG_PATH }}:$PATH"
          export ARCH=arm64
          export SUBARCH=arm64

          make -C $(pwd) O=out ARCH=arm64 \
            CC=clang \
            AR=llvm-ar \
            NM=llvm-nm \
            LD=ld.lld \
            OBJCOPY=llvm-objcopy \
            OBJDUMP=llvm-objdump \
            STRIP=llvm-strip \
            CROSS_COMPILE=${{ env.GCC64 }} \
            CROSS_COMPILE_ARM32=${{ env.GCC32 }} \
            CLANG_TRIPLE=aarch64-linux-gnu- \
            floral_defconfig 2>&1 | tee build.log

          make -C $(pwd) O=out ARCH=arm64 \
            CC=clang \
            AR=llvm-ar \
            NM=llvm-nm \
            LD=ld.lld \
            OBJCOPY=llvm-objcopy \
            OBJDUMP=llvm-objdump \
            STRIP=llvm-strip \
            CROSS_COMPILE=${{ env.GCC64 }} \
            CROSS_COMPILE_ARM32=${{ env.GCC32 }} \
            CLANG_TRIPLE=aarch64-linux-gnu- \
            -j$(nproc) 2>&1 | tee -a build.log

      - name: Repack boot.img via unpack_bootimg + mkbootimg
        run: |
          mkdir -p $HOME/bootwork && cd $HOME/bootwork
          unpack_bootimg --boot_img ${{ env.STOCK_BOOT }} --out unpacked --format mkbootimg
          cat unpacked/mkbootimg_args
          cp $GITHUB_WORKSPACE/out/arch/arm64/boot/Image.lz4-dtb unpacked/kernel
          MKARGS=$(cat unpacked/mkbootimg_args)
          eval mkbootimg $MKARGS --kernel unpacked/kernel --output new-boot.img
          ls -lh new-boot.img
          echo "BOOT_IMG=$HOME/bootwork/new-boot.img" >> $GITHUB_ENV

      - name: Upload boot.img
        uses: actions/upload-artifact@v4
        with:
          name: boot-pixel4xl-sukisu-susfs-${{ github.run_number }}
          path: ${{ env.BOOT_IMG }}
          retention-days: 30

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-${{ github.run_number }}
          path: build.log
          retention-days: 7
