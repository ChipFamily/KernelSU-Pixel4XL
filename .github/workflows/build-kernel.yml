name: Build Kernel - Pixel 4 XL (SukiSU-Ultra + SUSFS)

on:
  workflow_dispatch:
    inputs:
      kernelsu_tag:
        description: 'SukiSU-Ultra branch/tag'
        required: false
        default: 'susfs-main'
      susfs_branch:
        description: 'SUSFS branch'
        required: false
        default: 'kernel-4.14'

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    steps:
      - name: Checkout kernel source
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            bc bison build-essential ca-certificates cpio curl \
            flex git kmod libelf-dev libssl-dev \
            lz4 python3 python3-pip zip unzip wget \
            binutils-aarch64-linux-gnu
          # mkbootimg tools - install from AOSP git directly
          pip3 install --quiet \
            "git+https://android.googlesource.com/platform/system/tools/mkbootimg" || \
          sudo apt-get install -y mkbootimg

      - name: Download Clang toolchain (AOSP clang-r487747c)
        run: |
          mkdir -p $HOME/toolchain/clang
          cd $HOME/toolchain
          wget -q "https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/main/clang-r487747c.tar.gz" \
            -O clang.tar.gz || \
          wget -q "https://github.com/llvm/llvm-project/releases/download/llvmorg-17.0.6/clang+llvm-17.0.6-x86_64-linux-gnu-ubuntu-22.04.tar.xz" \
            -O clang.tar.gz
          tar -xf clang.tar.gz -C clang --strip-components=1 2>/dev/null || \
          tar -xf clang.tar.gz -C clang
          echo "CLANG_PATH=$HOME/toolchain/clang/bin" >> $GITHUB_ENV

      - name: Download stock boot.img (coral Android 13)
        run: |
          mkdir -p $HOME/stock && cd $HOME/stock
          wget -q "https://dl.google.com/dl/android/aosp/coral-tp1a.220624.014-factory-8f60813e.zip" -O factory.zip
          unzip -q factory.zip
          cd coral-tp1a.220624.014
          unzip -q image-coral-tp1a.220624.014.zip boot.img
          echo "STOCK_BOOT=$HOME/stock/coral-tp1a.220624.014/boot.img" >> $GITHUB_ENV

      - name: Integrate SukiSU-Ultra
        run: |
          rm -f drivers/kernelsu
          rm -rf KernelSU
          curl -LSs "https://raw.githubusercontent.com/SukiSU-Ultra/SukiSU-Ultra/main/kernel/setup.sh" | bash -s ${{ github.event.inputs.kernelsu_tag }}
          echo "SukiSU-Ultra integrated"

      - name: Apply SUSFS patches (kernel-4.14)
        run: |
          git clone --depth=1 -b ${{ github.event.inputs.susfs_branch }} \
            https://gitlab.com/simonpunk/susfs4ksu.git $HOME/susfs4ksu
          cp -v $HOME/susfs4ksu/kernel_patches/fs/* fs/
          cp -v $HOME/susfs4ksu/kernel_patches/include/linux/* include/linux/
          cp $HOME/susfs4ksu/kernel_patches/KernelSU/10_enable_susfs_for_ksu.patch KernelSU/
          cd KernelSU && patch -p1 --forward < 10_enable_susfs_for_ksu.patch || true && cd ..
          cp $HOME/susfs4ksu/kernel_patches/50_add_susfs_in_kernel-4.14.patch .
          patch -p1 --forward < 50_add_susfs_in_kernel-4.14.patch || true

      - name: Disable KPROBE hooks in KernelSU (non-GKI)
        run: |
          find KernelSU -type f \( -name '*.c' -o -name '*.h' \) | \
            xargs sed -i 's/#ifdef CONFIG_KPROBES/#if defined(CONFIG_KPROBES) \&\& 0/g'

      - name: Add SukiSU + SUSFS config options
        run: |
          cat >> defconfig << 'EOF'
          CONFIG_KSU=y
          CONFIG_KSU_MANUAL_HOOK=y
          CONFIG_KSU_SUSFS=y
          CONFIG_KSU_SUSFS_SUS_PATH=y
          CONFIG_KSU_SUSFS_SUS_MOUNT=y
          CONFIG_KSU_SUSFS_SUS_KSTAT=y
          CONFIG_KSU_SUSFS_SUS_OVERLAYFS=y
          CONFIG_KSU_SUSFS_TRY_UMOUNT=y
          CONFIG_KSU_SUSFS_AUTO_ADD_SUS_KSU_DEFAULT_MOUNT=y
          CONFIG_KSU_SUSFS_AUTO_ADD_TRY_UMOUNT_FOR_BIND_MOUNT=y
          CONFIG_KSU_SUSFS_SPOOFE_UNAME=y
          CONFIG_KSU_SUSFS_ENABLE_LOG=y
          EOF

      - name: Build kernel
        run: |
          export PATH="${{ env.CLANG_PATH }}:$PATH"
          export ARCH=arm64
          export SUBARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          export CLANG_TRIPLE=aarch64-linux-gnu-
          export CC=clang

          make O=out ARCH=arm64 CC=clang \
            CLANG_TRIPLE=aarch64-linux-gnu- \
            CROSS_COMPILE=aarch64-linux-gnu- \
            LLVM=1 LLVM_IAS=1 \
            floral_defconfig

          make O=out ARCH=arm64 CC=clang \
            CLANG_TRIPLE=aarch64-linux-gnu- \
            CROSS_COMPILE=aarch64-linux-gnu- \
            LLVM=1 LLVM_IAS=1 \
            -j$(nproc) 2>&1 | tee build.log

      - name: Repack boot.img via unpack_bootimg + mkbootimg
        run: |
          mkdir -p $HOME/bootwork && cd $HOME/bootwork

          # Unpack stock boot.img - extracts ramdisk and all header args
          unpack_bootimg --boot_img ${{ env.STOCK_BOOT }} --out unpacked --format mkbootimg

          # Show what was extracted
          ls -la unpacked/
          cat unpacked/mkbootimg_args || true

          # Replace kernel with our build
          cp $GITHUB_WORKSPACE/out/arch/arm64/boot/Image.lz4-dtb unpacked/kernel

          # Rebuild boot.img with original args + our kernel
          MKARGS=$(cat unpacked/mkbootimg_args)
          eval mkbootimg $MKARGS --kernel unpacked/kernel --output new-boot.img

          ls -lh new-boot.img
          echo "BOOT_IMG=$HOME/bootwork/new-boot.img" >> $GITHUB_ENV

      - name: Upload boot.img
        uses: actions/upload-artifact@v4
        with:
          name: boot-pixel4xl-sukisu-susfs-${{ github.run_number }}
          path: ${{ env.BOOT_IMG }}
          retention-days: 30

      - name: Upload build log (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-${{ github.run_number }}
          path: build.log
          retention-days: 7
