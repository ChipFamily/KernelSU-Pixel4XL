name: Build Kernel - Pixel 4 XL (SukiSU-Ultra + SUSFS)

on:
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    steps:
      - name: Checkout kernel source
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            bc bison build-essential ca-certificates cpio curl \
            flex git kmod libelf-dev libssl-dev \
            lz4 python3 python3-pip zip unzip wget \
            binutils-aarch64-linux-gnu mkbootimg

      - name: Download Clang r445002 (AOSP-12 GitHub mirror)
        run: |
          git clone --depth=1 \
            https://github.com/AOSP-12/prebuilts_clang_host_linux-x86_clang-r445002 \
            $HOME/toolchains/clang
          echo "CLANG_PATH=$HOME/toolchains/clang/bin" >> $GITHUB_ENV
          echo "CLANG_LIB=$HOME/toolchains/clang/lib64" >> $GITHUB_ENV
          $HOME/toolchains/clang/bin/clang --version

      - name: Download GCC toolchains (LineageOS mirrors)
        run: |
          git clone --depth=1 \
            https://github.com/LineageOS/android_prebuilts_gcc_linux-x86_aarch64_aarch64-linux-android-4.9 \
            $HOME/toolchains/aarch64-linux-android
          echo "GCC64=$HOME/toolchains/aarch64-linux-android/bin/aarch64-linux-android-" >> $GITHUB_ENV

          git clone --depth=1 \
            https://github.com/LineageOS/android_prebuilts_gcc_linux-x86_arm_arm-linux-androideabi-4.9 \
            $HOME/toolchains/arm-linux-androideabi
          echo "GCC32=$HOME/toolchains/arm-linux-androideabi/bin/arm-linux-androideabi-" >> $GITHUB_ENV

      - name: Download stock boot.img (coral Android 13)
        run: |
          mkdir -p $HOME/stock && cd $HOME/stock
          wget -q "https://dl.google.com/dl/android/aosp/coral-tp1a.220624.014-factory-8f60813e.zip" -O factory.zip
          unzip -q factory.zip
          cd coral-tp1a.220624.014
          unzip -q image-coral-tp1a.220624.014.zip boot.img
          echo "STOCK_BOOT=$HOME/stock/coral-tp1a.220624.014/boot.img" >> $GITHUB_ENV

      - name: Integrate SukiSU-Ultra (susfs-dev branch)
        run: |
          rm -f drivers/kernelsu
          rm -rf KernelSU
          curl -LSs "https://raw.githubusercontent.com/SukiSU-Ultra/SukiSU-Ultra/main/kernel/setup.sh" | bash -s susfs-dev
          echo "SukiSU-Ultra (susfs-dev) integrated"

      - name: Apply manual kernel hooks patch (non-GKI method for 4.14)
        # This is the correct approach for non-GKI kernels - manually hook into
        # fs/exec.c, fs/open.c, fs/stat.c etc. instead of using syscall table hook
        # Pattern from Edhic1/kernel_KSu_Next_Lancelot (Redmi 9, kernel 4.14)
        run: |
          cat > /tmp/ksu_hooks.patch << 'PATCH_EOF'
          --- a/fs/exec.c
          +++ b/fs/exec.c
          @@ -1706,6 +1706,12 @@ static int exec_binprm(struct linux_binprm *bprm)
           	return ret;
           }
           
          +#ifdef CONFIG_KSU
          +extern int ksu_handle_execveat(int *fd, struct filename **filename_ptr, void *argv,
          +			       void *envp, int *flags);
          +#endif
          +
           /*
            * sys_execve() executes a new program.
            */
          @@ -1720,6 +1726,10 @@ static int do_execveat_common(int fd, struct filename *filename,
           	struct files_struct *displaced;
           	int retval;
           
          +#ifdef CONFIG_KSU
          +	ksu_handle_execveat(&fd, &filename, &argv, &envp, &flags);
          +#endif
          +
           	if (IS_ERR(filename))
           		return PTR_ERR(filename);
          PATCH_EOF
          # Apply SUSFS kernel patches (fs/ and include/ only)
          git clone --depth=1 -b kernel-4.14 \
            https://gitlab.com/simonpunk/susfs4ksu.git $HOME/susfs4ksu
          cp -v $HOME/susfs4ksu/kernel_patches/fs/* fs/
          cp -v $HOME/susfs4ksu/kernel_patches/include/linux/* include/linux/
          cp $HOME/susfs4ksu/kernel_patches/50_add_susfs_in_kernel-4.14.patch .
          patch -p1 --forward < 50_add_susfs_in_kernel-4.14.patch || true
          echo "SUSFS kernel patches applied"

      - name: Disable syscall_hook (not compatible with kernel 4.14)
        # syscall_hook.h uses syscall_fn_t which is a 5.x+ type
        # On 4.14 we use manual hooks (CONFIG_KSU_MANUAL_HOOK) instead
        run: |
          # Prevent syscall_hook.c from being compiled
          if [ -f drivers/kernelsu/hook/syscall_hook.c ]; then
            echo "# syscall_hook disabled for kernel 4.14" > drivers/kernelsu/hook/syscall_hook.c
          fi
          # Remove syscall_hook.o from Makefile if present
          if [ -f drivers/kernelsu/hook/Makefile ]; then
            sed -i '/syscall_hook/d' drivers/kernelsu/hook/Makefile
          fi
          find drivers/kernelsu -name "Makefile" | xargs grep -l "syscall_hook" | \
            xargs -I{} sed -i '/syscall_hook/d' {} || true

      - name: Add KSU + SUSFS configs to floral_defconfig
        run: |
          DEFCONFIG=arch/arm64/configs/floral_defconfig
          sed -i 's/CONFIG_LTO_CLANG=y/# CONFIG_LTO_CLANG is not set/' $DEFCONFIG
          sed -i 's/CONFIG_CFI_CLANG=y/# CONFIG_CFI_CLANG is not set/' $DEFCONFIG
          printf 'CONFIG_KSU=y\n' >> $DEFCONFIG
          printf 'CONFIG_KSU_MANUAL_HOOK=y\n' >> $DEFCONFIG
          printf 'CONFIG_KALLSYMS=y\n' >> $DEFCONFIG
          printf 'CONFIG_KALLSYMS_ALL=y\n' >> $DEFCONFIG
          printf 'CONFIG_KSU_SUSFS=y\n' >> $DEFCONFIG
          printf 'CONFIG_KSU_SUSFS_SUS_PATH=y\n' >> $DEFCONFIG
          printf 'CONFIG_KSU_SUSFS_SUS_MOUNT=y\n' >> $DEFCONFIG
          printf 'CONFIG_KSU_SUSFS_SUS_KSTAT=y\n' >> $DEFCONFIG
          printf 'CONFIG_KSU_SUSFS_SUS_OVERLAYFS=y\n' >> $DEFCONFIG
          printf 'CONFIG_KSU_SUSFS_TRY_UMOUNT=y\n' >> $DEFCONFIG
          printf 'CONFIG_KSU_SUSFS_AUTO_ADD_SUS_KSU_DEFAULT_MOUNT=y\n' >> $DEFCONFIG
          printf 'CONFIG_KSU_SUSFS_AUTO_ADD_TRY_UMOUNT_FOR_BIND_MOUNT=y\n' >> $DEFCONFIG
          printf 'CONFIG_KSU_SUSFS_SPOOFE_UNAME=y\n' >> $DEFCONFIG
          printf 'CONFIG_KSU_SUSFS_ENABLE_LOG=y\n' >> $DEFCONFIG
          tail -20 $DEFCONFIG

      - name: Build kernel
        run: |
          export PATH="${{ env.CLANG_PATH }}:$PATH"
          export LD_LIBRARY_PATH="${{ env.CLANG_LIB }}:$LD_LIBRARY_PATH"
          export ARCH=arm64
          export SUBARCH=arm64
          export CLANG_TRIPLE=aarch64-linux-gnu-
          export CROSS_COMPILE=${{ env.GCC64 }}
          export CROSS_COMPILE_ARM32=${{ env.GCC32 }}

          make CC=clang AR=llvm-ar NM=llvm-nm \
            OBJCOPY=llvm-objcopy OBJDUMP=llvm-objdump STRIP=llvm-strip \
            LD=ld.lld \
            O=out floral_defconfig 2>&1 | tee build.log

          make CC=clang AR=llvm-ar NM=llvm-nm \
            OBJCOPY=llvm-objcopy OBJDUMP=llvm-objdump STRIP=llvm-strip \
            LD=ld.lld \
            O=out -j$(nproc) 2>&1 | tee -a build.log

      - name: Repack boot.img
        run: |
          mkdir -p $HOME/bootwork && cd $HOME/bootwork
          unpack_bootimg --boot_img ${{ env.STOCK_BOOT }} --out unpacked --format mkbootimg
          cat unpacked/mkbootimg_args
          cp $GITHUB_WORKSPACE/out/arch/arm64/boot/Image.lz4-dtb unpacked/kernel
          MKARGS=$(cat unpacked/mkbootimg_args)
          eval mkbootimg $MKARGS --kernel unpacked/kernel --output new-boot.img
          ls -lh new-boot.img
          echo "BOOT_IMG=$HOME/bootwork/new-boot.img" >> $GITHUB_ENV

      - name: Upload boot.img
        uses: actions/upload-artifact@v4
        with:
          name: boot-pixel4xl-sukisu-susfs-${{ github.run_number }}
          path: ${{ env.BOOT_IMG }}
          retention-days: 30

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-${{ github.run_number }}
          path: build.log
          retention-days: 7
