name: Build Kernel - Pixel 4 XL (SukiSU-Ultra + SUSFS)

on:
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    steps:
      - name: Checkout kernel source
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            bc bison build-essential ca-certificates cpio curl \
            flex git kmod libelf-dev libssl-dev \
            lz4 python3 python3-pip zip unzip wget \
            binutils-aarch64-linux-gnu

      - name: Download AOSP mkbootimg tools
        run: |
          git clone https://android.googlesource.com/platform/system/tools/mkbootimg \
            $HOME/mkbootimg-tools -b master-kernel-build-2022 --depth=1
          echo "MKBOOTIMG_TOOLS=$HOME/mkbootimg-tools" >> $GITHUB_ENV

      - name: Download Clang r445002 (AOSP-12 GitHub mirror)
        run: |
          git clone --depth=1 \
            https://github.com/AOSP-12/prebuilts_clang_host_linux-x86_clang-r445002 \
            $HOME/toolchains/clang
          echo "CLANG_PATH=$HOME/toolchains/clang/bin" >> $GITHUB_ENV
          echo "CLANG_LIB=$HOME/toolchains/clang/lib64" >> $GITHUB_ENV
          $HOME/toolchains/clang/bin/clang --version

      - name: Download GCC toolchains (LineageOS mirrors)
        run: |
          git clone --depth=1 \
            https://github.com/LineageOS/android_prebuilts_gcc_linux-x86_aarch64_aarch64-linux-android-4.9 \
            $HOME/toolchains/aarch64-linux-android
          echo "GCC64=$HOME/toolchains/aarch64-linux-android/bin/aarch64-linux-android-" >> $GITHUB_ENV

          git clone --depth=1 \
            https://github.com/LineageOS/android_prebuilts_gcc_linux-x86_arm_arm-linux-androideabi-4.9 \
            $HOME/toolchains/arm-linux-androideabi
          echo "GCC32=$HOME/toolchains/arm-linux-androideabi/bin/arm-linux-androideabi-" >> $GITHUB_ENV

      - name: Download stock boot.img (coral Android 13)
        run: |
          mkdir -p $HOME/stock && cd $HOME/stock
          wget -q "https://dl.google.com/dl/android/aosp/coral-tp1a.220624.014-factory-8f60813e.zip" -O factory.zip
          unzip -q factory.zip
          cd coral-tp1a.220624.014
          unzip -q image-coral-tp1a.220624.014.zip boot.img
          echo "STOCK_BOOT=$HOME/stock/coral-tp1a.220624.014/boot.img" >> $GITHUB_ENV
          FORMAT_MKBOOTING=$(echo `$HOME/mkbootimg-tools/unpack_bootimg.py --boot_img=$HOME/stock/coral-tp1a.220624.014/boot.img --format mkbootimg`)
          echo "FORMAT_MKBOOTING=$FORMAT_MKBOOTING" >> $GITHUB_ENV

      - name: Integrate SukiSU-Ultra (nongki branch - correct for non-GKI kernel 4.14)
        run: |
          rm -f drivers/kernelsu
          rm -rf KernelSU
          curl -LSs "https://raw.githubusercontent.com/SukiSU-Ultra/SukiSU-Ultra/main/kernel/setup.sh" | bash -s nongki
          echo "=== KernelSU/kernel/ structure ==="
          ls KernelSU/kernel/
          find KernelSU/kernel -name "*syscall*" | sort

      - name: Apply KSU manual hooks via Python (kernel-specific, no patch file)
        # Official non-GKI method: insert hooks directly into kernel source files
        # Using Python for reliable insertion at exact function locations
        run: |
          python3 << 'PYEOF'
          import re

          def insert_after(content, marker, insertion):
              """Insert text after the first occurrence of marker"""
              idx = content.find(marker)
              if idx == -1:
                  return content, False
              insert_pos = idx + len(marker)
              return content[:insert_pos] + insertion + content[insert_pos:], True

          def insert_before(content, marker, insertion):
              """Insert text before the first occurrence of marker"""
              idx = content.find(marker)
              if idx == -1:
                  return content, False
              return content[:idx] + insertion + content[idx:], True

          # === fs/exec.c ===
          with open('fs/exec.c', 'r') as f:
              src = f.read()

          if 'ksu_handle_execveat' not in src:
              # Insert extern declarations before do_execveat_common
              decl = '''
#ifdef CONFIG_KSU
extern bool ksu_execveat_hook __read_mostly;
extern int ksu_handle_execveat(int *fd, struct filename **filename_ptr, void *argv,
			void *envp, int *flags);
extern int ksu_handle_execveat_sucompat(int *fd, struct filename **filename_ptr,
				 void *argv, void *envp, int *flags);
#endif
'''
              src, ok = insert_before(src, 'static int do_execveat_common(', decl)
              print(f"exec.c: inserted decls: {ok}")

              # Insert hook call at start of do_execveat_common body
              hook = '''
#ifdef CONFIG_KSU
	if (unlikely(ksu_execveat_hook))
		ksu_handle_execveat(&fd, &filename, &argv, &envp, &flags);
	else
		ksu_handle_execveat_sucompat(&fd, &filename, &argv, &envp, &flags);
#endif
'''
              # Find the function body opening
              marker = 'static int do_execveat_common(int fd, struct filename *filename,\n\t\t\t      struct user_arg_ptr argv,\n\t\t\t      struct user_arg_ptr envp,\n\t\t\t      int flags)\n{'
              src, ok = insert_after(src, marker, hook)
              if not ok:
                  # Try simpler match
                  marker2 = 'static int do_execveat_common(int fd, struct filename *filename,'
                  idx = src.find(marker2)
                  if idx != -1:
                      brace = src.find('\n{', idx)
                      if brace != -1:
                          src = src[:brace+2] + hook + src[brace+2:]
                          ok = True
              print(f"exec.c: inserted hook: {ok}")

              with open('fs/exec.c', 'w') as f:
                  f.write(src)
          else:
              print("exec.c: hooks already present")

          # === fs/open.c ===
          with open('fs/open.c', 'r') as f:
              src = f.read()

          if 'ksu_handle_faccessat' not in src:
              decl = '''
#ifdef CONFIG_KSU
extern int ksu_handle_faccessat(int *dfd, const char __user **filename_user, int *mode,
			 int *flags);
#endif
'''
              # Insert before faccessat syscall
              for marker in ['SYSCALL_DEFINE3(faccessat,', 'long do_faccessat(']:
                  if marker in src:
                      src, ok = insert_before(src, marker, decl)
                      print(f"open.c: inserted decl before {marker}: {ok}")
                      break

              hook = '''#ifdef CONFIG_KSU
	ksu_handle_faccessat(&dfd, &filename, &mode, NULL);
#endif
'''
              # Insert at start of faccessat body - find the opening brace
              for marker in ['long do_faccessat(int dfd', 'SYSCALL_DEFINE3(faccessat']:
                  idx = src.find(marker)
                  if idx != -1:
                      brace = src.find('\n{', idx)
                      if brace != -1:
                          src = src[:brace+2] + '\n' + hook + src[brace+2:]
                          print(f"open.c: inserted hook after {marker}")
                          break

              with open('fs/open.c', 'w') as f:
                  f.write(src)
          else:
              print("open.c: hooks already present")

          # === fs/read_write.c ===
          with open('fs/read_write.c', 'r') as f:
              src = f.read()

          if 'ksu_handle_vfs_read' not in src:
              decl = '''
#ifdef CONFIG_KSU
extern bool ksu_vfs_read_hook __read_mostly;
extern int ksu_handle_vfs_read(struct file **file_ptr, char __user **buf_ptr,
			size_t *count_ptr, loff_t **pos);
#endif
'''
              src, ok = insert_before(src, 'ssize_t vfs_read(', decl)
              print(f"read_write.c: inserted decl: {ok}")

              hook = '''#ifdef CONFIG_KSU
	if (unlikely(ksu_vfs_read_hook))
		ksu_handle_vfs_read(&file, &buf, &count, &pos);
#endif
'''
              idx = src.find('ssize_t vfs_read(')
              if idx != -1:
                  brace = src.find('\n{', idx)
                  if brace != -1:
                      src = src[:brace+2] + '\n\t' + hook.strip() + '\n' + src[brace+2:]
                      print("read_write.c: inserted hook")

              with open('fs/read_write.c', 'w') as f:
                  f.write(src)
          else:
              print("read_write.c: hooks already present")

          # === fs/stat.c ===
          with open('fs/stat.c', 'r') as f:
              src = f.read()

          if 'ksu_handle_stat' not in src:
              decl = '''
#ifdef CONFIG_KSU
extern int ksu_handle_stat(int *dfd, const char __user **filename_user, int *flags);
#endif
'''
              # Try vfs_statx first, fall back to vfs_fstatat
              for fn in ['int vfs_statx(', 'int vfs_fstatat(']:
                  if fn in src:
                      src, ok = insert_before(src, fn, decl)
                      print(f"stat.c: inserted decl before {fn}: {ok}")
                      hook = '''#ifdef CONFIG_KSU
	ksu_handle_stat(&dfd, &filename, &flags);
#endif
'''
                      idx = src.find(fn)
                      if idx != -1:
                          brace = src.find('\n{', idx)
                          if brace != -1:
                              src = src[:brace+2] + '\n\t' + hook.strip() + '\n' + src[brace+2:]
                              print(f"stat.c: inserted hook in {fn}")
                      break

              with open('fs/stat.c', 'w') as f:
                  f.write(src)
          else:
              print("stat.c: hooks already present")

          # === drivers/input/input.c (safe mode) ===
          with open('drivers/input/input.c', 'r') as f:
              src = f.read()

          if 'ksu_handle_input_handle_event' not in src:
              decl = '''
#ifdef CONFIG_KSU
extern bool ksu_input_hook __read_mostly;
extern int ksu_handle_input_handle_event(unsigned int *type, unsigned int *code, int *value);
#endif
'''
              src, ok = insert_before(src, 'static void input_handle_event(', decl)
              print(f"input.c: inserted decl: {ok}")

              hook = '''#ifdef CONFIG_KSU
	if (unlikely(ksu_input_hook))
		ksu_handle_input_handle_event(&type, &code, &value);
#endif
'''
              idx = src.find('static void input_handle_event(')
              if idx != -1:
                  brace = src.find('\n{', idx)
                  if brace != -1:
                      src = src[:brace+2] + '\n\t' + hook.strip() + '\n' + src[brace+2:]
                      print("input.c: inserted hook")

              with open('drivers/input/input.c', 'w') as f:
                  f.write(src)
          else:
              print("input.c: hooks already present")

          # === fs/devpts/inode.c (pm support) ===
          with open('fs/devpts/inode.c', 'r') as f:
              src = f.read()

          if 'ksu_handle_devpts' not in src:
              decl = '''
#ifdef CONFIG_KSU
extern int ksu_handle_devpts(struct inode*);
#endif
'''
              src, ok = insert_before(src, 'void *devpts_get_priv(', decl)
              print(f"inode.c: inserted decl: {ok}")

              hook = '''#ifdef CONFIG_KSU
	ksu_handle_devpts(dentry->d_inode);
#endif
'''
              idx = src.find('void *devpts_get_priv(')
              if idx != -1:
                  brace = src.find('\n{', idx)
                  if brace != -1:
                      src = src[:brace+2] + '\n\t' + hook.strip() + '\n' + src[brace+2:]
                      print("inode.c: inserted hook")

              with open('fs/devpts/inode.c', 'w') as f:
                  f.write(src)
          else:
              print("inode.c: hooks already present")

          print("=== All KSU hooks applied ===")
          PYEOF

      - name: Apply SUSFS kernel patches (fs + include + kernel-4.14 patch)
        run: |
          git clone --depth=1 -b kernel-4.14 \
            https://gitlab.com/simonpunk/susfs4ksu.git $HOME/susfs4ksu
          cp -v $HOME/susfs4ksu/kernel_patches/fs/* fs/
          cp -v $HOME/susfs4ksu/kernel_patches/include/linux/* include/linux/
          cp $HOME/susfs4ksu/kernel_patches/KernelSU/10_enable_susfs_for_ksu.patch KernelSU/
          cd KernelSU && patch -p1 --forward < 10_enable_susfs_for_ksu.patch || true && cd ..
          cp $HOME/susfs4ksu/kernel_patches/50_add_susfs_in_kernel-4.14.patch .
          patch -p1 --forward < 50_add_susfs_in_kernel-4.14.patch || true
          echo "SUSFS patches applied"

      - name: Add KSU + SUSFS configs to floral_defconfig
        run: |
          DEFCONFIG=arch/arm64/configs/floral_defconfig
          sed -i 's/CONFIG_LTO_CLANG=y/# CONFIG_LTO_CLANG is not set/' $DEFCONFIG
          sed -i 's/CONFIG_CFI_CLANG=y/# CONFIG_CFI_CLANG is not set/' $DEFCONFIG
          printf 'CONFIG_KSU=y\n' >> $DEFCONFIG
          printf 'CONFIG_KSU_MANUAL_HOOK=y\n' >> $DEFCONFIG
          printf 'CONFIG_KALLSYMS=y\n' >> $DEFCONFIG
          printf 'CONFIG_KALLSYMS_ALL=y\n' >> $DEFCONFIG
          printf 'CONFIG_KSU_SUSFS=y\n' >> $DEFCONFIG
          printf 'CONFIG_KSU_SUSFS_SUS_PATH=y\n' >> $DEFCONFIG
          printf 'CONFIG_KSU_SUSFS_SUS_MOUNT=y\n' >> $DEFCONFIG
          printf 'CONFIG_KSU_SUSFS_SUS_KSTAT=y\n' >> $DEFCONFIG
          printf 'CONFIG_KSU_SUSFS_SUS_OVERLAYFS=y\n' >> $DEFCONFIG
          printf 'CONFIG_KSU_SUSFS_TRY_UMOUNT=y\n' >> $DEFCONFIG
          printf 'CONFIG_KSU_SUSFS_AUTO_ADD_SUS_KSU_DEFAULT_MOUNT=y\n' >> $DEFCONFIG
          printf 'CONFIG_KSU_SUSFS_AUTO_ADD_TRY_UMOUNT_FOR_BIND_MOUNT=y\n' >> $DEFCONFIG
          printf 'CONFIG_KSU_SUSFS_SPOOF_UNAME=y\n' >> $DEFCONFIG
          printf 'CONFIG_KSU_SUSFS_ENABLE_LOG=y\n' >> $DEFCONFIG
          tail -20 $DEFCONFIG

      - name: Build kernel
        run: |
          export PATH="${{ env.CLANG_PATH }}:$PATH"
          export LD_LIBRARY_PATH="${{ env.CLANG_LIB }}:$LD_LIBRARY_PATH"
          export ARCH=arm64
          export SUBARCH=arm64
          export CLANG_TRIPLE=aarch64-linux-gnu-
          export CROSS_COMPILE=${{ env.GCC64 }}
          export CROSS_COMPILE_ARM32=${{ env.GCC32 }}

          make CC=clang AR=llvm-ar NM=llvm-nm \
            OBJCOPY=llvm-objcopy OBJDUMP=llvm-objdump STRIP=llvm-strip \
            LD=ld.lld \
            O=out floral_defconfig 2>&1 | tee build.log

          make CC=clang AR=llvm-ar NM=llvm-nm \
            OBJCOPY=llvm-objcopy OBJDUMP=llvm-objdump STRIP=llvm-strip \
            LD=ld.lld \
            O=out -j$(nproc) 2>&1 | tee -a build.log

      - name: Repack boot.img (AOSP Python tools)
        run: |
          mkdir -p $HOME/bootwork && cd $HOME/bootwork
          NEW_KERNEL=$GITHUB_WORKSPACE/out/arch/arm64/boot/Image.lz4-dtb

          ${{ env.MKBOOTIMG_TOOLS }}/unpack_bootimg.py --boot_img=${{ env.STOCK_BOOT }}
          cp $NEW_KERNEL out/kernel
          ${{ env.MKBOOTIMG_TOOLS }}/mkbootimg.py ${{ env.FORMAT_MKBOOTING }} -o boot.img
          ls -lh boot.img
          echo "BOOT_IMG=$HOME/bootwork/boot.img" >> $GITHUB_ENV

      - name: Upload boot.img
        uses: actions/upload-artifact@v4
        with:
          name: boot-pixel4xl-sukisu-susfs-${{ github.run_number }}
          path: ${{ env.BOOT_IMG }}
          retention-days: 30

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-${{ github.run_number }}
          path: build.log
          retention-days: 7
